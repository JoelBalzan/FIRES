[meta]
name    = "paper_191001"
seed    = 19
version = 1

[simulation.grid]
f_start_MHz        = 751.5
f_end_MHz          = 900.5
df_MHz             = 1.0
t_start_ms         = -6.4327
t_end_ms           = 10.61
dt_ms              = 0.0230
reference_freq_MHz = 1000

[propagation.scattering]
index = -4.85

[propagation.scintillation]
enable          = true
timescale_s     = 300
bandwidth_Hz    = 2.05e6
derive_from_tau = false
N_images        = 5000
theta_extent    = 3.0
return_field    = false

[emission]
model = "gaussian_microshot"

[[emission.components]]
t0_ms           = -2.0
width_ms        = 0.5
amplitude_Jy    = 1.5
spectral_index  = 0.0
tau_ms          = 1.78
dm              = 0.0
rm              = 0.0
pa_deg          = 20
lfrac           = 0.99
vfrac           = -0.05
dpa_deg_per_ms  = 0.0
band_centre_MHz = 0.0
band_width_MHz  = 0.0

[emission.components.microshots]
N               = 100
width_frac_low  = 0.05
width_frac_high = 0.20

[emission.components.microshot_scatter]
t0_sigma_ms          = 0.0
width_sigma_ms       = 0.0
amplitude_sigma      = 0.0
spectral_index_sigma = 0.0
tau_sigma_ms         = 0.0
dm_sigma             = 0.0
rm_sigma             = 0.0
pa_sigma_deg         = 30.0
lfrac_sigma          = 0.0
vfrac_sigma          = 0.0
dpa_sigma            = 0.0
band_centre_sigma    = 0.0
band_width_sigma     = 0.0

[emission.components.amplitude_distribution]
type = "powerlaw"

[emission.components.amplitude_distribution.powerlaw]
alpha      = 3.0
xmin_scale = 0.1
xmax_scale = 10.0

[emission.components.amplitude_distribution.lognormal]
sigma = 0.3

[emission.components.amplitude_distribution.uniform]
low_scale  = 0.0
high_scale = 2.0

[analysis]
buffer_fraction = 1.0

[analysis.sweep]
enable = true
mode   = "sd"

[analysis.sweep.parameter]
component = 0
name      = "pa_sigma_deg"
start     = 0.0
stop      = 45.0
step      = 1.0
log_steps = false

[observation]
sefd             = 1.2
target_snr       = 174.0
baseline_correct = false

[numerics]
n_cpus = 12
nseed  = 500

[output]
write     = false
mode      = "full"
directory = "output"